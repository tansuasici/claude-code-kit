name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr_branch: ${{ steps.pr-info.outputs.branch }}
      pr_sha: ${{ steps.pr-info.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - name: Get PR info
        id: pr-info
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_BRANCH=$(echo "$PR_JSON" | jq -r '.headBranchName')
          PR_SHA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.sha')
          echo "branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"

  # GITHUB_TOKEN pushes don't trigger workflows on the release PR branch.
  # Run the same checks here and report commit statuses on the PR head SHA.
  validate-release-pr:
    name: Validate Release PR
    needs: release-please
    if: needs.release-please.outputs.pr_sha
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}

      - name: Markdown Lint
        id: markdown-lint
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
            !CHANGELOG.md
          config: .markdownlint.json

      - name: Link Check
        id: link-check
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-path node_modules **/*.md
          fail: true
          failIfEmpty: false

      - name: Template Validation
        id: template-validation
        continue-on-error: true
        run: |
          errors=0
          for file in examples/*/CODEBASE_MAP.md; do
            echo "Checking structure: $file"
            for section in "## What" "## Tech Stack" "## Key Commands" "## Directory Structure" "## Critical Files"; do
              if ! grep -q "$section" "$file"; then
                echo "  ERROR: Missing section '$section' in $file"
                errors=$((errors + 1))
              fi
            done
          done
          echo "Checking structure: CODEBASE_MAP.md"
          for section in "## What" "## Why" "## Tech Stack" "## Key Commands" "## Directory Structure" "## Critical Files" "## Architecture" "## Known Constraints" "## Environment"; do
            if ! grep -q "$section" "CODEBASE_MAP.md"; then
              echo "  ERROR: Missing section '$section' in CODEBASE_MAP.md"
              errors=$((errors + 1))
            fi
          done
          echo "Checking structure: CLAUDE.md"
          for section in "## Session Boot" "## Plan First" "## Scope Discipline" "## Verification" "## Self-Improvement"; do
            if ! grep -q "$section" "CLAUDE.md"; then
              echo "  ERROR: Missing section '$section' in CLAUDE.md"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors structural error(s) found."
            exit 1
          else
            echo "All templates structurally valid."
          fi

      - name: Report status checks
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_sha }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ML_RESULT: ${{ steps.markdown-lint.outcome }}
          LC_RESULT: ${{ steps.link-check.outcome }}
          TV_RESULT: ${{ steps.template-validation.outcome }}
        run: |
          report_status() {
            local context="$1" outcome="$2"
            local state="success"
            local desc="Passed (via release workflow)"
            case "$outcome" in
              failure)  state="failure"; desc="Failed (via release workflow)" ;;
              cancelled) state="error"; desc="Cancelled (via release workflow)" ;;
              skipped)  state="pending"; desc="Skipped (via release workflow)" ;;
            esac
            gh api "repos/${REPO}/statuses/${SHA}" \
              --method POST \
              --field state="${state}" \
              --field context="${context}" \
              --field description="${desc}" \
              --field "target_url=${RUN_URL}"
          }
          report_status "Markdown Lint" "$ML_RESULT"
          report_status "Link Check" "$LC_RESULT"
          report_status "Template Validation" "$TV_RESULT"

  # Auto-publish to npm whenever release-please cuts a new release.
  # Requires NPM_TOKEN secret (https://www.npmjs.com/settings/<user>/tokens
  # → Granular Access Token, scope to @tansuasici/claude-code-kit, write).
  publish-npm:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ needs.release-please.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
          echo "Publishing $PKG_VERSION..."

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
