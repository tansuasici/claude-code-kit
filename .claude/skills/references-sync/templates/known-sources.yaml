# known-sources.yaml — curated registry of public llms.txt endpoints
#
# Each entry maps a package (by name + ecosystem) to a published llms.txt URL.
# /references-sync scans your project's manifests and, for each dependency
# that matches an entry here, fetches the URL and writes it to
# docs/references/<package>-llms.txt.
#
# This file ships with the kit and lists only well-known, public endpoints.
# For project-specific or private sources, create
# `.claude/known-sources.local.yaml` (gitignored) with the same schema —
# the skill merges both at runtime.
#
# Schema:
#   package    canonical name in its ecosystem (npm name, PyPI name, crate, module path)
#   ecosystem  npm | pypi | cargo | go | gem | composer
#   url        absolute URL to llms.txt (or equivalent agent-friendly doc)
#   description short note for the index
#   aliases    (optional) alternative names this package is known by
#
# Verification status:
#   verified   URL was reachable when the entry was added
#   speculative URL is guessed based on vendor convention — may 404
#
# When adding entries, prefer `verified` and include the date you checked.

version: 1

sources:

  # ── AI / LLM SDKs ──────────────────────────────────────────────────────
  - package: "@anthropic-ai/sdk"
    ecosystem: npm
    url: "https://docs.anthropic.com/llms.txt"
    description: "Anthropic Claude API SDK (TypeScript/JavaScript)"
    status: speculative
    aliases: ["anthropic"]

